<!--To automatically generate the template
use ! + Tab-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account</title>

    <!--Bootstrap/css-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!--css/style.css-->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- all HTML content goes here -->

    <!-- container-fluid takes the full width of the screen -->
    <!-- vh-100 makes it take the full height of the screen -->
    <!-- d-flex, align-items-center and justify-content-center center -->
    <!-- the content both vertically and horizontally -->
    <div
      class="container-fluid vh-100 d-flex align-items-center justify-content-center"
    >
      <!-- card is a Bootstrap component that creates a box with shadow -->
      <!-- p-4 adds internal spacing (padding) of level 4 -->
      <!-- shadow adds a soft shadow around the box -->
      <div class="card p-4 shadow" style="width: 100%; max-width: 400px">
        <h3 class="text-center mb-4">Create account</h3>

        <!-- id="formulario-registro" is the identifier that script.js -->
        <!-- uses to capture the registration form submission -->
        <form id="formulario-registro">
          <div class="mb-3">
            <label for="registro-nombre" class="form-label">Name</label>
            <!-- type="text" is the default type, for plain text -->
            <input
              type="text"
              class="form-control"
              id="registro-nombre"
              placeholder="Your name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="registro-correo" class="form-label">Email</label>
            <!-- type="email" validates email format automatically -->
            <input
              type="email"
              class="form-control"
              id="registro-correo"
              placeholder="name@technova.com"
              required
            />
          </div>

          <div class="mb-3">
            <label for="registro-password" class="form-label">Password</label>
            <!-- minlength="6" reinforces the backend validation -->
            <!-- that requires at least 6 characters -->
            <input
              type="password"
              class="form-control"
              id="registro-password"
              placeholder="Minimum 6 characters"
              minlength="6"
              required
            />
          </div>

          <div class="mb-3">
            <label for="registro-password2" class="form-label">Confirm password</label>
            <!-- This field is compared with the previous one in script.js -->
            <!-- to ensure the user typed the same password -->
            <input
              type="password"
              class="form-control"
              id="registro-password2"
              placeholder="Repeat your password"
              minlength="6"
              required
            />
          </div>

          <!-- Success or error message for registration -->
          <div id="mensaje-registro" class="d-none mb-3"></div>

          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <!-- Link to go back to login (separate file) -->
        <p class="text-center mt-3">
          <span class="texto-ayuda">Already have an account?</span>
          <a href="index.html">Log in</a>
        </p>
      </div>
    </div>

    <!-- Scripts -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- jQuery, needed before our script.js because script.js -->
    <!-- uses jQuery syntax ($) for Ajax -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>

    <!-- js/script.js -->
    <script src="js/script.js" type="text/javascript"></script>
  </body>
</html>
