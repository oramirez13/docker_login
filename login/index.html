<!--To automatically generate the template
use ! + Tab-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in</title>

    <!--Bootstrap/css-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!--css/style.css-->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- all HTML content goes here -->

    <!-- container-fluid takes the full width of the screen -->
    <!-- vh-100 makes it take the full height of the screen -->
    <!-- d-flex, align-items-center and justify-content-center center -->
    <!-- the content both vertically and horizontally -->
    <div
      class="container-fluid vh-100 d-flex align-items-center justify-content-center"
    >
      <!-- card is a Bootstrap component that creates a box with shadow -->
      <!-- p-4 adds internal spacing (padding) of level 4 -->
      <!-- shadow adds a soft shadow around the box -->
      <div class="card p-4 shadow" style="width: 100%; max-width: 400px">
        <h3 class="text-center mb-4">Log in</h3>

        <!-- id="formulario-login" is the identifier that script.js -->
        <!-- will use to capture the form submission -->
        <form id="formulario-login">
          <!-- mb-3 adds spacing below each field group -->
          <div class="mb-3">
            <label for="correo" class="form-label">Email</label>
            <!-- type="email" makes the browser automatically validate -->
            <!-- that the entered text has email format -->
            <!-- required prevents submitting the form if the field is empty -->
            <input
              type="email"
              class="form-control"
              id="correo"
              placeholder="name@technova.com"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <!-- type="password" hides the text the user types -->
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <!-- Here we will show success or error messages with JavaScript -->
          <!-- d-none hides it by default, until script.js needs it -->
          <div id="mensaje-resultado" class="d-none mb-3"></div>

          <!-- type="submit" makes this button trigger the form -->
          <!-- submission event, which we will capture in script.js -->
          <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>

        <!-- Link to the registration page (separate file) -->
        <p class="text-center mt-3">
          <span class="texto-ayuda">Don't have an account?</span>
          <a href="registro.html">Create account</a>
        </p>
      </div>
    </div>

    <!-- Scripts -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- jQuery, needed before our script.js because script.js -->
    <!-- uses jQuery syntax ($) for Ajax -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>

    <!-- js/script.js -->
    <script src="js/script.js" type="text/javascript"></script>
  </body>
</html>
